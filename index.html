<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LabExtract AI | Análisis Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#2563eb' } } }
        }
    </script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center font-sans">

    <div class="max-w-md w-full px-6 py-10 bg-white rounded-2xl shadow-xl border border-slate-100 text-center">
        <!-- Header -->
        <div class="mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-100 text-blue-600 mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-900">LabExtract AI</h1>
            <p class="text-slate-500 mt-2">Extrae datos clínicos estructurados desde PDFs en segundos.</p>
        </div>

        <!-- Acción -->
        <div id="ui-area">
            <label for="fileInput" class="cursor-pointer group flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-slate-300 rounded-xl hover:border-blue-500 hover:bg-blue-50 transition-all">
                <span class="text-blue-600 font-semibold group-hover:scale-105 transition-transform">Seleccionar archivo PDF</span>
                <span class="text-xs text-slate-400 mt-1">Soporta resultados de laboratorio estándar</span>
            </label>
            <input type="file" id="fileInput" accept="application/pdf" class="hidden">
        </div>

        <!-- Spinner (oculto inicialmente) -->
        <div id="spinner" class="hidden py-8">
            <div class="w-10 h-10 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mx-auto"></div>
            <p class="mt-4 text-slate-600 font-medium animate-pulse">Procesando con IA...</p>
        </div>
    </div>

    <script>
        const input = document.getElementById('fileInput');
        const uiArea = document.getElementById('ui-area');
        const spinner = document.getElementById('spinner');

        input.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Transición de estado
            uiArea.classList.add('hidden');
            spinner.classList.remove('hidden');

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/api/v1/extract', { method: 'POST', body: formData });
                
                if (!response.ok) throw new Error('Error');

                const data = await response.json();
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);

                const a = document.createElement('a');
                a.href = url;
                a.download = `resultado_${Date.now()}.json`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                
                window.location.reload();
            } catch (error) {
                alert("Ups, algo salió mal. Inténtalo de nuevo.");
                window.location.reload();
            }
        });
    </script>
</body>
</html>
